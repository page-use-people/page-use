name: Docker Core

on:
    push:
        branches:
            - main
        paths:
            - apps/core/package.json

permissions:
    contents: read

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 2

            - name: Check version changed
              id: version
              run: |
                  CURRENT=$(node -p "require('./apps/core/package.json').version")
                  PREVIOUS=$(git show HEAD~1:apps/core/package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version")
                  echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
                  if [ "$CURRENT" != "$PREVIOUS" ]; then
                    echo "changed=true" >> "$GITHUB_OUTPUT"
                  fi

            - uses: docker/setup-buildx-action@v3
              if: steps.version.outputs.changed == 'true'

            - uses: docker/login-action@v3
              if: steps.version.outputs.changed == 'true'
              with:
                  username: pageuse
                  password: ${{ secrets.DOCKER_HUB_TOKEN }}

            - uses: docker/build-push-action@v6
              if: steps.version.outputs.changed == 'true'
              with:
                  context: .
                  file: Dockerfile.core
                  push: true
                  tags: |
                      pageuse/core:${{ steps.version.outputs.version }}
                      pageuse/core:latest
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Update Docker Hub description
              if: steps.version.outputs.changed == 'true'
              uses: peter-evans/dockerhub-description@v4
              with:
                  username: pageuse
                  password: ${{ secrets.DOCKER_HUB_TOKEN }}
                  repository: pageuse/core
                  readme-filepath: apps/core/README.md
