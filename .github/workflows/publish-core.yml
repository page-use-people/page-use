name: Publish Core

on:
    push:
        branches:
            - main
        paths:
            - apps/core/package.json

permissions:
    contents: read

jobs:
    check-version:
        runs-on: ubuntu-latest

        outputs:
            version: ${{ steps.version.outputs.version }}
            changed: ${{ steps.version.outputs.changed }}

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 2

            - name: Check version changed
              id: version
              run: |
                  CURRENT=$(node -p "require('./apps/core/package.json').version")
                  PREVIOUS=$(git show HEAD~1:apps/core/package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version")
                  echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
                  if [ "$CURRENT" != "$PREVIOUS" ]; then
                    echo "changed=true" >> "$GITHUB_OUTPUT"
                  fi

    publish-amd64:
        runs-on: ubuntu-latest

        needs:
            - check-version

        if: needs.check-version.outputs.changed == 'true'

        steps:
            - uses: actions/checkout@v6

            - uses: docker/setup-buildx-action@v3

            - uses: docker/login-action@v3
              with:
                  username: pageuse
                  password: ${{ secrets.DOCKER_HUB_TOKEN }}

            - uses: docker/build-push-action@v6
              with:
                  context: .
                  file: Dockerfile.core
                  push: true
                  tags: pageuse/core:${{ needs.check-version.outputs.version }}-amd64
                  platforms: linux/amd64
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    publish-arm64:
        runs-on: blacksmith-4vcpu-ubuntu-2404-arm

        needs:
            - check-version

        if: needs.check-version.outputs.changed == 'true'

        steps:
            - uses: actions/checkout@v6

            - name: Setup Blacksmith Builder
              uses: useblacksmith/setup-docker-builder@v1

            - uses: docker/login-action@v3
              with:
                  username: pageuse
                  password: ${{ secrets.DOCKER_HUB_TOKEN }}

            - uses: useblacksmith/build-push-action@v2
              with:
                  context: .
                  file: Dockerfile.core
                  push: true
                  tags: pageuse/core:${{ needs.check-version.outputs.version }}-arm64
                  platforms: linux/arm64

    merge-manifests:
        runs-on: ubuntu-latest

        needs:
            - publish-amd64
            - publish-arm64
            - check-version

        steps:
            - uses: docker/setup-buildx-action@v3

            - uses: docker/login-action@v3
              with:
                  username: pageuse
                  password: ${{ secrets.DOCKER_HUB_TOKEN }}

            - name: Merge Docker images
              env:
                  VERSION: ${{ needs.check-version.outputs.version }}
              run: |
                  docker buildx imagetools create \
                    -t "pageuse/core:${VERSION}" \
                    "pageuse/core:${VERSION}-amd64" \
                    "pageuse/core:${VERSION}-arm64"

                  docker buildx imagetools create \
                    -t "pageuse/core:latest" \
                    "pageuse/core:${VERSION}-amd64" \
                    "pageuse/core:${VERSION}-arm64"

    update-dockerhub-description:
        runs-on: ubuntu-latest

        needs:
            - merge-manifests
            - check-version

        if: needs.check-version.outputs.changed == 'true'

        steps:
            - uses: actions/checkout@v6

            - name: Update Docker Hub description
              uses: peter-evans/dockerhub-description@v4
              with:
                  username: pageuse
                  password: ${{ secrets.DOCKER_HUB_TOKEN }}
                  repository: pageuse/core
                  readme-filepath: apps/core/README.md
